# Den multiplexer config (tmux). Den owns the multiplexing UI.
# status off  -> Den owns the multiplexing UI (no tmux status line).
# window-size latest -> clamp to the most-recently-active client (PC<->iPad).
# See PoC findings doc §6/§7.
set -g status off
set -g window-size latest

# Use Den's configured shell so interactive features (history search / Ctrl+R)
# match plain Den sessions. The value below is filled in at write time.
set -g default-command "__DEN_SHELL__"

# Den drives tabs / panes via its own UI; release the prefix so Ctrl+b and every
# other key pass straight through to the shell (no interference). External
# orchestration via `tmux send-keys -t` / `capture-pane` still works because
# those do not go through the keyboard prefix.
set -g prefix None
unbind C-b
